<!DOCTYPE html>
<html>
<head>
  
  <title>Time Tracker FINAL</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial;
      padding:10px;
      background:white;
      transition:0.3s;
    }

    h2 { text-align:center; }

    .controls { text-align:center; margin-bottom:15px; }

    button, input {
      padding:6px;
      margin:5px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    .start-btn { background:#22c55e; color:white; }
    .stop-btn { background:#ef4444; color:white; }

    .timer { font-size:26px; font-weight:bold; }

    .weekdays {
      display:grid;
      grid-template-columns:repeat(7,1fr);
      text-align:center;
      font-weight:bold;
      margin-bottom:5px;
    }

    .calendar {
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:5px;
    }

    .day {
      background:white;
      border:1px solid #ccc;
      padding:5px;
      min-height:150px;
    }

    .weekend { background:#fecaca; }

    .header { font-size:12px; font-weight:bold; }

    .entry {
      font-size:11px;
      margin:3px 0;
      padding:4px;
      border-radius:4px;
      color:white;
      cursor:pointer;
    }

    .work { background:#3b82f6; }
    .holiday { background:#f97316; }

    .weekTotal {
      font-size:12px;
      font-weight:bold;
      margin-top:5px;
    }

    table {
      width:100%;
      margin-top:20px;
      border-collapse: collapse;
    }

    th, td {
      border:1px solid #ccc;
      padding:6px;
      text-align:center;
    }
  </style>
</head>

<body>

<h2>⏱ Time Tracker FINAL</h2>

<div class="controls">

  <div class="timer" id="timer">00:00:00</div>
  <div id="status">Stopped ⚫</div>

  <button id="startBtn" class="start-btn">Start</button>
  <button id="stopBtn" class="stop-btn" disabled>Stop</button>

  <br><br>

  <input type="date" id="manualDate">
  <input type="time" id="manualStart">
  <input type="time" id="manualEnd">

  <button id="manualBtn">Add Manual Entry</button>

  <br><br>

  <button onclick="exportData()">Export Excel</button>

</div>

<div class="weekdays">
  <div>Mon</div><div>Tue</div><div>Wed</div>
  <div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
</div>

<div class="calendar" id="calendar"></div>

<h3>Entries</h3>
<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Start</th>
      <th>End</th>
      <th>Hours</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
let interval=null;
let records=JSON.parse(localStorage.getItem("records"))||[];

// 🇩🇪 NRW HOLIDAYS WITH NAMES
const holidays = {
 "2026-01-01": "New Year",
 "2026-04-03": "Good Friday",
 "2026-04-06": "Easter Monday",
 "2026-05-01": "Labour Day",
 "2026-05-14": "Ascension Day",
 "2026-05-25": "Whit Monday",
 "2026-06-04": "Corpus Christi",
 "2026-10-03": "German Unity Day",
 "2026-12-25": "Christmas Day",
 "2026-12-26": "Boxing Day"
};

// 🎨 BACKGROUND
function updateBackground(){
 const running = localStorage.getItem("running")==="true";
 document.body.style.background = running ? "#dcfce7" : "white";
}

// TIMER
startBtn.onclick=start;
stopBtn.onclick=stop;
manualBtn.onclick=addManual;

function start(){
 if(localStorage.getItem("running")==="true") return;

 localStorage.setItem("running","true");
 localStorage.setItem("startTime",Date.now());

 interval=setInterval(updateTimer,1000);
 updateUI();
 updateBackground();
}

function updateTimer(){
 let start=localStorage.getItem("startTime");
 if(!start) return;

 let diff=Math.floor((Date.now()-start)/1000);
 timer.innerText=formatTime(diff);
}

function stop(){
 clearInterval(interval);

 let start=localStorage.getItem("startTime");
 if(!start) return;

 let end=Date.now();
 let duration=Math.floor((end-start)/1000);

 let d=new Date();

 records.push({
  id:Date.now()+Math.random(),
  date:d.toISOString().split("T")[0],
  start:start,
  end:end,
  duration
 });

 localStorage.removeItem("running");
 localStorage.removeItem("startTime");

 timer.innerText="00:00:00";

 save();
 updateUI();
 updateBackground();
}

// FORMAT
function formatTime(sec){
 let h=Math.floor(sec/3600);
 let m=Math.floor((sec%3600)/60);
 let s=sec%60;
 return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatClock(date){
 return new Date(date).toTimeString().slice(0,5);
}

function getDayName(dateStr){
 return new Date(dateStr).toLocaleDateString("en-US",{weekday:"short"});
}

// MANUAL
function addManual(){
 let date=manualDate.value;
 let start=manualStart.value;
 let end=manualEnd.value;

 if(!date||!start||!end) return;

 let s=new Date(date+"T"+start);
 let e=new Date(date+"T"+end);

 let duration=(e-s)/1000;

 records.push({
  id:Date.now()+Math.random(),
  date,
  start:s.getTime(),
  end:e.getTime(),
  duration
 });

 save();
}

// DELETE
function deleteEntry(id){
 if(!confirm("Delete?")) return;
 records=records.filter(r=>r.id!==id);
 save();
}

// SAVE
function save(){
 localStorage.setItem("records",JSON.stringify(records));
 drawCalendar();
 drawTable();
}

// DATES (MONDAY START)
function generateDates(){
 let start=new Date("2026-04-01");
 let day=start.getDay();
 if(day===0) day=7;
 start.setDate(start.getDate()-(day-1));

 let end=new Date("2026-10-31");

 let arr=[];
 while(start<=end){
  arr.push(new Date(start));
  start.setDate(start.getDate()+1);
 }
 return arr;
}

const dates=generateDates();

// CALENDAR
function drawCalendar(){
 calendar.innerHTML="";

 let weekSum=0;

 dates.forEach(d=>{
  let div=document.createElement("div");
  div.className="day";

  if(d.getDay()===0||d.getDay()===6){
    div.classList.add("weekend");
  }

  let ds=d.toISOString().split("T")[0];
  div.innerHTML=`<div class="header">${ds}</div>`;

  // HOLIDAY
  if(holidays[ds]){
    div.innerHTML+=`
      <div class="entry holiday">
        ${holidays[ds]}<br>
        08:00:00
      </div>
    `;
    weekSum+=8*3600;
  }

  // WORK
  records.forEach(r=>{
    if(r.date===ds){
      let e=document.createElement("div");
      e.className="entry work";

      e.innerHTML=`
        ${formatClock(r.start)} - ${formatClock(r.end)}<br>
        ${formatTime(r.duration)}
      `;

      e.onclick=()=>deleteEntry(r.id);

      div.appendChild(e);
      weekSum+=r.duration;
    }
  });

  if(d.getDay()===0){
    div.innerHTML+=`<div class="weekTotal">Week: ${formatTime(weekSum)}</div>`;
    weekSum=0;
  }

  calendar.appendChild(div);
 });
}

// TABLE
function drawTable(){
 tableBody.innerHTML="";

 records.forEach(r=>{
  let tr=document.createElement("tr");

  let btn=document.createElement("button");
  btn.innerText="Delete";
  btn.onclick=()=>deleteEntry(r.id);

  tr.innerHTML=`
    <td>${r.date}</td>
    <td>${formatClock(r.start)}</td>
    <td>${formatClock(r.end)}</td>
    <td>${formatTime(r.duration)}</td>
  `;

  let td=document.createElement("td");
  td.appendChild(btn);
  tr.appendChild(td);

  tableBody.appendChild(tr);
 });
}

// EXPORT
function exportData(){
 let data=[["Day","Date","Start","End","Hours"]];

 let weekSum=0;

 dates.forEach(d=>{
  let ds=d.toISOString().split("T")[0];
  let dayName=getDayName(ds);

  if(holidays[ds]){
    data.push([dayName,ds,holidays[ds],"","08:00:00"]);
    weekSum+=8*3600;
  }

  records.forEach(r=>{
    if(r.date===ds){
      data.push([
        dayName,
        ds,
        formatClock(r.start),
        formatClock(r.end),
        formatTime(r.duration)
      ]);
      weekSum+=r.duration;
    }
  });

  if(new Date(ds).getDay()===0){
    data.push(["","Week Total","","",formatTime(weekSum)]);
    data.push(["","","","",""]);
    weekSum=0;
  }
 });

 let ws=XLSX.utils.aoa_to_sheet(data);
 let wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Timesheet");

 XLSX.writeFile(wb,"timesheet.xlsx");
}

// UI
function updateUI(){
 const running=localStorage.getItem("running")==="true";

 startBtn.disabled=running;
 stopBtn.disabled=!running;

 status.innerText=running?"Working 🟢":"Stopped ⚫";
}

// INIT
if(localStorage.getItem("running")==="true"){
 interval=setInterval(updateTimer,1000);
 updateTimer();
}

updateUI();
updateBackground();
drawCalendar();
drawTable();
</script>

</body>
</html>
